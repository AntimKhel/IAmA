name: Export and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  KOBWEB_CLI_VERSION: 0.9.21
  # Change this if your repo name changes
  SITE_BASE_PATH: /IAmA

jobs:
  export:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Download Kobweb CLI
        run: |
          curl -fsSL "https://github.com/varabyte/kobweb-cli/releases/download/v${KOBWEB_CLI_VERSION}/kobweb-${KOBWEB_CLI_VERSION}.zip" -o kobweb-cli.zip
          unzip kobweb-cli.zip
          echo "$PWD/kobweb-${KOBWEB_CLI_VERSION}/bin" >> $GITHUB_PATH

      - name: Export site
        run: |
          cd site
          kobweb export --notty --layout static

      - name: Fix paths for GitHub Pages subdirectory
        run: |
          cd site/.kobweb/site
          # Rewrite absolute asset paths to include the base path
          find . -name "*.html" -exec sed -i \
            -e "s|src=\"/iama.js\"|src=\"${SITE_BASE_PATH}/iama.js\"|g" \
            -e "s|href=\"/favicon.ico\"|href=\"${SITE_BASE_PATH}/favicon.ico\"|g" \
            {} +
          echo "Fixed asset paths for ${SITE_BASE_PATH}"
          # Verify
          grep -l "iama.js" *.html blog/*.html | head -5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/.kobweb/site/

  deploy:
    needs: export
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
